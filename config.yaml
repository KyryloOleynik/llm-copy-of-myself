project:
  name: personal-telegram-ai-bot
  owner_from_id: user624349412

data:
  source: DataExport_2026-07-10/result.json
  cleaned: DataExport_2026-07-10/cleaned_sessions.json
  dataset: DataExport_2026-07-10/dataset.json
  output_dir: data/processed
  session_gap_hours: 12
  train_ratio: 0.8
  validation_ratio: 0.1
  test_ratio: 0.1
  max_target_tokens: 256
  max_examples_per_chat: 1000
  max_identical_short_target: 25
  short_target_max_tokens: 3
  contains_unredacted_private_data: true

model:
  base_model: Qwen/Qwen3.5-4B
  sequence_length: 4096
  thinking_enabled: false

training:
  output_dir: artifacts/training/qwen3.5-4b-r8
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05
  learning_rate: 0.00003
  micro_batch_size: 1
  gradient_accumulation_steps: 16
  epochs: 1
  gradient_checkpointing: true
  logging_steps: 5
  # Optimizer steps (each is 16 micro-batches with the settings above).
  save_steps: 50
  eval_steps: 50
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  lora_target_policy: language-token-mixers
  seed: 42

retrieval:
  database: data/retrieval.sqlite3
  context_limit: 8192

bot:
  polling: true
  state_database: data/bot.sqlite3
  model_server_url: http://127.0.0.1:8080/v1
